  </head><body><header class="topbar"><div class="shell"><a class="brand" href="/zh/"><span class="brand-mark" aria-hidden="true"></span><span>Health Toolkit Lab</span></a><nav class="nav-links"><a href="/zh/calculators/">全部计算器</a></nav></div></header><main class="tool-hero"><div class="shell tool-layout"><article class="panel tool-panel"><div class="breadcrumbs"><a href="/zh/">首页</a><span>/</span><a href="/zh/calculators/">计算器</a><span>/</span><span>基础代谢</span></div><span class="eyebrow">营养规划</span><h1>基础代谢计算器</h1><p>基础代谢表示身体在静息状态下维持基本生命活动大致会消耗多少热量，是热量规划的起点之一。</p><div data-tool-page="bmr"></div></article><aside class="panel tool-sidebar"><h2>怎么理解这个结果</h2><ul class="checklist"><li>基础代谢不是你全天真正的消耗。</li><li>走路、训练、工作和消化都会额外消耗热量。</li><li>日常饮食更适合参考 TDEE，而不是只看基础代谢。</li></ul></aside></div></main><script src="/assets/app.js?20260319-31"></script><script src="/assets/site.js?20260319-31"></script></body></html>
